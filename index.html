<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genesys Messenger Language Switch</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      margin: 0;
      padding: 60px 20px;
      background: #f7f7f7;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 32px 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    p {
      color: #444;
      margin-bottom: 24px;
    }

    .button-group {
      display: inline-flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      font-size: 16px;
      padding: 10px 20px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .status {
      font-size: 14px;
      color: #666;
      margin-top: 12px;
      text-align: left;
      word-break: break-word;
    }

    .active-lang {
      font-weight: bold;
      color: #111827;
    }

    .debug-box {
      margin-top: 24px;
      padding: 16px;
      border-radius: 10px;
      background: #f3f4f6;
      text-align: left;
      font-size: 13px;
      color: #111827;
    }

    .debug-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .debug-log {
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>

  <script>
    const DEPLOYMENTS = {
      EN: "1ab7b0c7-e7f0-4223-8b42-094de485c804",
      TH: "fe82086b-a697-4787-af2b-5726ca4c4c49"
    };

    const DEFAULT_LANG = "TH";

    function debugLog(message) {
      console.log(message);
      const el = document.getElementById("debugLog");
      if (el) {
        el.textContent += message + "\n";
      }
    }

    function getSelectedLanguage() {
      return localStorage.getItem("gcLang") || DEFAULT_LANG;
    }

    function switchLanguage(lang) {
      localStorage.setItem("gcLang", lang);
      window.location.reload();
    }

    function loadGenesysMessenger() {
      const lang = getSelectedLanguage();
      const deploymentId = DEPLOYMENTS[lang] || DEPLOYMENTS[DEFAULT_LANG];
      const scriptUrl = "https://apps.mypurecloud.jp/genesys-bootstrap/genesys.min.js";

      debugLog("Page URL: " + window.location.href);
      debugLog("Hostname: " + window.location.hostname);
      debugLog("Selected language: " + lang);
      debugLog("Deployment ID: " + deploymentId);
      debugLog("Loading bootstrap: " + scriptUrl);

      (function (g, e, n, es, ys) {
        g["_genesysJs"] = e;
        g[e] = g[e] || function () {
          (g[e].q = g[e].q || []).push(arguments);
        };
        g[e].t = 1 * new Date();
        g[e].c = es;

        ys = document.createElement("script");
        ys.async = 1;
        ys.src = n;
        ys.charset = "utf-8";
        ys.id = "genesys-bootstrap";

        ys.onload = function () {
          debugLog("Genesys bootstrap script loaded successfully.");
        };

        ys.onerror = function () {
          debugLog("ERROR: Failed to load Genesys bootstrap script.");
        };

        document.head.appendChild(ys);
      })(
        window,
        "Genesys",
        scriptUrl,
        {
          environment: "prod-apne1",
          deploymentId: deploymentId
        }
      );

      setTimeout(function () {
        if (window.Genesys) {
          debugLog("window.Genesys exists.");
        } else {
          debugLog("window.Genesys not found after load timeout.");
        }
      }, 3000);
    }

    document.addEventListener("DOMContentLoaded", function () {
      const lang = getSelectedLanguage();
      const deploymentId = DEPLOYMENTS[lang] || DEPLOYMENTS[DEFAULT_LANG];

      document.getElementById("currentLang").textContent = lang;
      document.getElementById("currentDeployment").textContent = deploymentId;
      document.getElementById("currentHost").textContent = window.location.hostname;
      document.getElementById("currentUrl").textContent = window.location.href;

      loadGenesysMessenger();
    });
  </script>
</head>
<body>
  <div class="container">
    <h1>Genesys Cloud Knowledge Portal</h1>
    <p>Select language</p>

    <div class="button-group">
      <button type="button" onclick="switchLanguage('EN')">EN</button>
      <button type="button" onclick="switchLanguage('TH')">TH</button>
    </div>

    <div class="status">
      Current language: <span id="currentLang" class="active-lang">-</span>
    </div>
    <div class="status">
      Deployment ID: <span id="currentDeployment">-</span>
    </div>
    <div class="status">
      Hostname: <span id="currentHost">-</span>
    </div>
    <div class="status">
      URL: <span id="currentUrl">-</span>
    </div>

    <div class="debug-box">
      <div class="debug-title">Debug Log</div>
      <div id="debugLog" class="debug-log"></div>
    </div>
  </div>
</body>
</html>
