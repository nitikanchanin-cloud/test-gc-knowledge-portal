<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genesys Knowledge Portal Language Switch</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: #f7f7f7;
      color: #111827;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;

    }

      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      font-size: 16px;
      padding: 10px 20px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: #111827;
      color: #fff;
    }

    button:hover {
      opacity: 0.92;
    }

    .status {
      font-size: 14px;
      color: #4b5563;
      text-align: center;
      margin-bottom: 20px;
      word-break: break-word;
    }

    .portal-wrapper {
      margin-top: 24px;
      min-height: 600px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    /* Required render target for Genesys Knowledge Portal */
    #genesys-support-center {

    }
